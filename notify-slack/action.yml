name: 'Notify Slack'
description: 'Sends a Slack notification with a custom message.'

inputs:
  project-name:
    description: 'The name of the project.'
    required: true
  icon:
    description: 'The icon for the Slack notification.'
    required: false
    default: ':alert:'
  slack-channel:
    description: 'The Slack channel to send the notification to.'
    required: true
  jobs:
    description: 'Deprecated. A GitHub needs-like object string of jobs and their results (e.g., from toJSON(needs)). Build a message string in the caller and use the message input instead.'
    required: false
  message:
    description: 'The Slack message to send (mrkdwn format). When not set, falls back to a failed-jobs summary built from the jobs input (deprecated).'
    required: false
  color:
    description: 'Slack attachment color (e.g. good, danger, warning, or a hex color code).'
    required: false
    default: 'danger'

runs:
  using: "composite"
  steps:
    - name: Collect Failed Jobs
      if: ${{ inputs.message == '' }}
      shell: bash
      id: collect_failed_jobs
      env:
        JOBS: ${{ inputs.jobs }}
      run: |
        echo "::warning::Calling notify-slack without a 'message' input is deprecated. Build the message in the caller and pass it via the 'message' input."
        # Parse the provided jobs JSON and extract keys where result == "failure".
        FAILED_JOBS=$(echo "$JOBS" | jq -r 'to_entries | map(select(.value.result == "failure") | .key) | join(", ")')
        echo "Failed Jobs: $FAILED_JOBS"
        echo "failed-jobs=$FAILED_JOBS" >> $GITHUB_OUTPUT
    - name: Vault Secrets
      id: secrets
      uses: SonarSource/vault-action-wrapper@v3
      with:
        secrets: |
          development/kv/data/slack token | SLACK_TOKEN;
    - name: Set up Python
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
      with:
        python-version: '3.10'
    - name: Install dependencies
      shell: bash
      run: |
        python3 -m venv "$GITHUB_ACTION_PATH/.venv"
        "$GITHUB_ACTION_PATH/.venv/bin/pip" install -r "$GITHUB_ACTION_PATH/requirements.txt" --quiet
    - name: Send Slack Notification
      shell: bash
      env:
        SLACK_TOKEN: ${{ fromJSON(steps.secrets.outputs.vault).SLACK_TOKEN }}
        INPUT_CHANNEL: ${{ inputs.slack-channel }}
        INPUT_PROJECT_NAME: ${{ inputs.project-name }}
        INPUT_ICON: ${{ inputs.icon }}
        INPUT_COLOR: ${{ inputs.color }}
        INPUT_MESSAGE: ${{ inputs.message != '' && inputs.message || format('*Run:* {0}/{1}/actions/runs/{2}%0A*Failed Jobs:* {3}', github.server_url, github.repository, github.run_id, steps.collect_failed_jobs.outputs.failed-jobs) }}
      run: |
        "$GITHUB_ACTION_PATH/.venv/bin/python" "$GITHUB_ACTION_PATH/notify_slack.py" \
          --channel "$INPUT_CHANNEL" \
          --project-name "$INPUT_PROJECT_NAME" \
          --icon "$INPUT_ICON" \
          --color "$INPUT_COLOR" \
          --message "$INPUT_MESSAGE"
