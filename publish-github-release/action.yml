name: 'Publish GitHub Release'
description: 'Publishes a GitHub Release.'
author: 'SonarSource'

inputs:
  github-token:
    description: 'The GitHub token for API calls.'
    required: true
    default: ${{ github.token }}
  release-version:
    description: 'The version number for the new release (e.g., v1.0.0). This will also be the tag name. If not provided, uses RELEASE_VERSION environment variable.'
    required: false
  branch:
    description: 'The branch, commit, or tag to create the release from.'
    required: false
    default: 'master'
  release-notes:
    description: 'The full markdown content for the release notes.'
    required: false
  draft:
    description: 'A boolean value to indicate if the release should be a draft. Defaults to true.'
    required: false
    default: 'true'
  release-workflow:
    description: 'The filename of the release workflow to trigger in the caller repository.'
    required: false
    default: 'release.yml'

outputs:
  release-url:
    description: 'The URL of the newly created release.'
    value: ${{ steps.publish-release.outputs.release-url || steps.create-release.outputs.release-url }}

runs:
  using: "composite"
  steps:
    - name: Check out repository
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

    - name: Validate Version Input
      shell: bash
      run: |
        VERSION="${{ inputs.release-version || env.RELEASE_VERSION }}"
        if [[ -z "$VERSION" ]]; then
          echo "::error::Both release-version input and RELEASE_VERSION environment variable are missing. One must be provided."
          exit 1
        fi
        echo "VALIDATED_VERSION=$VERSION" >> $GITHUB_ENV

    - name: Prepare Release Notes
      if: ${{ inputs.release-notes != '' }}
      shell: bash
      run: |
        echo "${RELEASE_NOTES}" > release-notes.md
      env:
        RELEASE_NOTES: ${{ inputs.release-notes }}

    - name: Prepare Empty Release Notes
      if: ${{ inputs.release-notes == '' }}
      shell: bash
      run: |
        echo "" > release-notes.md

    - name: Detect release workflow version
      shell: bash
      env:
        RELEASE_WORKFLOW: ${{ inputs.release-workflow }}
      run: |
        WORKFLOW_FILE=".github/workflows/$RELEASE_WORKFLOW"
        if [[ -f "$WORKFLOW_FILE" ]]; then
          # Check for gh-action_release v6: tag reference (@v6, @6.x.y) or SHA-pinned with # 6 comment
          if grep -qE 'gh-action_release.*(@v6|@6\.|#\s*6)' "$WORKFLOW_FILE"; then
            echo "Detected gh-action_release v6 in $WORKFLOW_FILE"
            echo "RELEASE_WORKFLOW_VERSION=v6" >> $GITHUB_ENV
          # Fallback: if the workflow accepts a releaseId input, must be v6
          elif grep -q 'releaseId' "$WORKFLOW_FILE"; then
            echo "Detected releaseId input in $WORKFLOW_FILE, must be v6"
            echo "RELEASE_WORKFLOW_VERSION=v6" >> $GITHUB_ENV
          else
            echo "Using gh-action_release v7 flow (default)"
            echo "RELEASE_WORKFLOW_VERSION=v7" >> $GITHUB_ENV
          fi
        else
          echo "Using gh-action_release v7 flow (default)"
          echo "RELEASE_WORKFLOW_VERSION=v7" >> $GITHUB_ENV
        fi

    - name: Create Draft Release
      id: create-release
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        HAS_RELEASE_NOTES: ${{ inputs.release-notes != '' }}
        BRANCH_NAME: ${{ inputs.branch }}
        DRAFT_MODE: ${{ inputs.draft }}
      run: |
        # Determine if we need to publish after artifacts are attached.
        # v6 + draft=false means we need to publish the release.
        # We create a draft first so that artifacts can be attached before publishing.
        if [[ "$RELEASE_WORKFLOW_VERSION" == "v6" && "$DRAFT_MODE" != "true" ]]; then
          echo "NEEDS_PUBLISH=true" >> $GITHUB_ENV
        else
          echo "NEEDS_PUBLISH=false" >> $GITHUB_ENV
        fi

        # Check if a release with the same title already exists
        EXPECTED_TITLE="$VALIDATED_VERSION"
        EXISTING_RELEASE=$(gh api repos/${{ github.repository }}/releases --jq ".[] | select(.name == \"$EXPECTED_TITLE\")" || echo "")

        if [[ -n "$EXISTING_RELEASE" ]]; then
          EXISTING_DRAFT=$(echo "$EXISTING_RELEASE" | jq -r '.draft')
          EXISTING_URL=$(echo "$EXISTING_RELEASE" | jq -r '.html_url')
          EXISTING_ID=$(echo "$EXISTING_RELEASE" | jq -r '.id')

          if [[ "$EXISTING_DRAFT" == "true" ]]; then
            echo "Reusing existing draft release '$EXPECTED_TITLE'"
            echo "release-url=${EXISTING_URL}" >> $GITHUB_OUTPUT
            echo "release-id=${EXISTING_ID}" >> $GITHUB_OUTPUT
            exit 0
          else
            echo "::error::A published release with title '$EXPECTED_TITLE' already exists."
            exit 1
          fi
        fi

        # No existing release found — create as draft
        NOTES_FLAG=""
        if [[ "$HAS_RELEASE_NOTES" == "true" ]]; then
          NOTES_FLAG="--notes-file release-notes.md"
        fi

        RELEASE_URL=$(gh release create "$VALIDATED_VERSION" \
          --target "$BRANCH_NAME" \
          --title "$VALIDATED_VERSION" \
          $NOTES_FLAG \
          --draft)

        echo "release-url=${RELEASE_URL}" >> $GITHUB_OUTPUT

        RELEASE_ID=$(gh release view "$VALIDATED_VERSION" --json databaseId --jq '.databaseId')
        echo "release-id=${RELEASE_ID}" >> $GITHUB_OUTPUT
        # Get the release ID for published releases (v6) or draft releases (v7)
        if [[ "$DRAFT_MODE" != "true" || "$RELEASE_WORKFLOW_VERSION" == "v7" ]]; then
          RELEASE_ID=$(gh release view "$VALIDATED_VERSION" --json databaseId --jq '.databaseId')
          echo "release-id=${RELEASE_ID}" >> $GITHUB_OUTPUT
        fi

    - name: Publish Release
      id: publish-release
      if: ${{ env.NEEDS_PUBLISH == 'true' }}
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
      run: |
        echo "Publishing draft release '$VALIDATED_VERSION'..."
        PUBLISHED_URL=$(gh release edit "$VALIDATED_VERSION" --draft=false)
        echo "Release published: $PUBLISHED_URL"
        echo "release-url=${PUBLISHED_URL}" >> $GITHUB_OUTPUT

    - name: Trigger Release Workflow
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        GITHUB_REF: ${{ inputs.branch }}
        DRAFT_MODE: ${{ inputs.draft }}
        RELEASE_WORKFLOW: ${{ inputs.release-workflow }}
        RELEASE_ID_OUTPUT: ${{ steps.create-release.outputs.release-id }}
      run: |
        # v6 requires releaseId; v7 does not (it reuses the draft directly)
        RELEASE_ID_ARG=""
        if [[ "$RELEASE_WORKFLOW_VERSION" == "v6" ]]; then
          if [[ "$DRAFT_MODE" == "true" ]]; then
            RELEASE_ID_ARG='-f releaseId=N/A'
          else
            RELEASE_ID_ARG="-f releaseId=$RELEASE_ID_OUTPUT"
          fi
        fi

        echo "Triggering release workflow '$RELEASE_WORKFLOW' ($RELEASE_WORKFLOW_VERSION) with version '$VALIDATED_VERSION' and dryRun=$DRAFT_MODE..."
        gh workflow run "$RELEASE_WORKFLOW" \
          --repo "${{ github.repository }}" \
          --ref $GITHUB_REF \
          -f "version=$VALIDATED_VERSION" \
          $RELEASE_ID_ARG \
          -f "dryRun=$DRAFT_MODE"

        echo "Workflow triggered successfully"

        # Wait a moment for the workflow to start, then get the run ID
        sleep 30

        RUN_ID=$(gh run list \
          --repo "${{ github.repository }}" \
          --workflow "$RELEASE_WORKFLOW" \
          --limit 1 \
          --created ">=$(date -u -d '5 minutes ago' +%Y-%m-%dT%H:%M:%SZ)" \
          --json databaseId \
          --jq '.[0].databaseId')

        if [[ -z "$RUN_ID" ]] || [[ "$RUN_ID" == "null" ]]; then
          echo "::error::Failed to get workflow run ID"
          exit 1
        fi

        echo "Monitoring workflow run ID: $RUN_ID"

        # Wait for the workflow to complete
        while true; do
          RUN_STATUS=$(gh run view "$RUN_ID" \
            --repo "${{ github.repository }}" \
            --json status,conclusion \
            --jq '{status: .status, conclusion: .conclusion}')

          STATUS=$(echo "$RUN_STATUS" | jq -r '.status')
          CONCLUSION=$(echo "$RUN_STATUS" | jq -r '.conclusion')

          echo "Workflow status: $STATUS, conclusion: $CONCLUSION"

          if [[ "$STATUS" == "completed" ]]; then
            if [[ "$CONCLUSION" == "success" ]]; then
              echo "✅ Release workflow completed successfully!"
              break
            else
              echo "::error::❌ Release workflow failed with conclusion: $CONCLUSION"
              gh run view "$RUN_ID" --repo "${{ github.repository }}" --log-failed
              exit 1
            fi
          elif [[ "$STATUS" == "cancelled" ]] || [[ "$STATUS" == "failure" ]]; then
            echo "::error::❌ Release workflow was cancelled or failed"
            gh run view "$RUN_ID" --repo "${{ github.repository }}" --log-failed
            exit 1
          fi

          # Wait 15 seconds before checking again
          sleep 15
        done
