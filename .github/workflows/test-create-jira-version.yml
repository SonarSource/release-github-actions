name: Test Create Jira Version Action

on:
  workflow_call:
  pull_request:
    paths:
      - 'create-jira-version/**'
      - '.github/workflows/test-create-jira-version.yml'
  push:
    branches:
      - branch-*
    paths:
      - 'create-jira-version/**'
      - '.github/workflows/test-create-jira-version.yml'
  workflow_dispatch:

jobs:
  unit-tests:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          cd create-jira-version
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run unit tests
        run: |
          cd create-jira-version
          python -m pytest test_create_jira_version.py -v --cov=create_jira_version --cov-report=term-missing

  sandbox-integration-test:
    name: Sandbox Integration Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Generate unique version name
        id: version
        run: |
          VERSION_NAME="99.$(date +%-m%d).$(date +%-H%M)"
          echo "new-version-name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "Generated version name: $VERSION_NAME"

      - name: Create Jira version via action
        id: create-version
        uses: ./create-jira-version
        with:
          jira-project-key: 'SONARIAC'
          jira-new-version-name: ${{ steps.version.outputs.new-version-name }}
          use-jira-sandbox: 'true'

      - name: Verify action outputs
        run: |
          NEW_NAME="${{ steps.create-version.outputs.jira-new-version-name }}"
          NEW_ID="${{ steps.create-version.outputs.jira-new-version-id }}"
          if [[ -z "$NEW_NAME" || -z "$NEW_ID" ]]; then
            echo "❌ Action did not produce expected outputs (name='$NEW_NAME' id='$NEW_ID')"
            exit 1
          fi
          echo "✅ New version created: $NEW_NAME (id=$NEW_ID)"

      - name: Get Jira credentials from Vault for cleanup
        uses: SonarSource/vault-action-wrapper@v3
        id: secrets
        if: always()
        with:
          secrets: |
            development/kv/data/jira user | JIRA_USER;
            development/kv/data/jira token | JIRA_TOKEN;

      - name: Clean up created version
        if: always()
        env:
          JIRA_USER: ${{ fromJSON(steps.secrets.outputs.vault).JIRA_USER }}
          JIRA_TOKEN: ${{ fromJSON(steps.secrets.outputs.vault).JIRA_TOKEN }}
          VERSION_NAME: ${{ steps.version.outputs.new-version-name }}
        run: |
          pip install jira
          python - <<'EOF'
          import os, sys
          from jira import JIRA
          from jira.exceptions import JIRAError

          user = os.environ["JIRA_USER"]
          token = os.environ["JIRA_TOKEN"]
          version_name = os.environ["VERSION_NAME"]

          jira = JIRA("https://sonarsource-sandbox-608.atlassian.net/", basic_auth=(user, token))
          versions = jira.project_versions("SONARIAC")
          version = next((v for v in versions if v.name == version_name), None)
          if version:
              version.delete(moveFixIssuesTo=None)
              print(f"✅ Deleted version: {version_name}")
          else:
              print(f"Version '{version_name}' not found (already deleted or never created)")
          EOF
