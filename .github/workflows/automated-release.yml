name: Automate Release

on:
  workflow_call:
    inputs:
      jira-project-key:
        description: "Jira project key"
        required: true
        type: string
      ktlo-jira-project-key:
        description: "Jira project key where the KTLO epic lives. Defaults to jira-project-key if not provided."
        required: false
        type: string
      ktlo-epic-name-pattern:
        description: "Regex pattern to match the KTLO epic summary. Defaults to 'KTLO'."
        required: false
        type: string
      project-name:
        description: "Project name"
        required: true
        type: string
      plugin-name:
        description: "Plugin name"
        required: true
        type: string
      plugin-artifacts-sqs:
        description: "SQS Plugin artifacts"
        required: false
        type: string
      plugin-artifacts-sqc:
        description: "SQC Plugin artifacts"
        required: false
        type: string
      plugin-artifacts-sqaa:
        description: "SQAA Plugin artifacts"
        required: false
        type: string
      sqaa-base-branch:
        description: "Base branch for the SQAA pull request"
        required: false
        type: string
        default: "master"
      sqaa-reviewers:
        description: "Comma-separated list of GitHub usernames to request a review on the SQAA pull request"
        required: false
        type: string
      use-jira-sandbox:
        description: "Use Jira sandbox"
        required: false
        type: boolean
        default: true
      is-draft-release:
        description: "Create draft release"
        required: false
        type: boolean
        default: true
      pm-email:
        description: "Product manager email"
        required: true
        type: string
      release-automation-secret-name:
        description: "Release automation secret name to create integration PRs in SQS, SQC, and SQAA. If not provided uses `sonar-{plugin-name}-release-automation` as default."
        required: false
        type: string
      short-description:
        description: "A brief summary of what the release contains. This description will be used for the release ticket and integration tickets."
        required: true
        type: string
      rule-props-changed:
        description: "Did any rule properties change in this release"
        required: true
        type: string
      branch:
        description: "Branch from which to do the release"
        required: true
        type: string
        default: "master"
      release-notes:
        description: "Release notes for the Jira Release Version. If blank, release notes will be generated from the Jira Release."
        required: false
        type: string
      sq-ide-short-description:
        description: "Short summary of SQ IDE related changes."
        required: false
        type: string
      new-version:
        description: "New version to release"
        required: false
        type: string
      create-slvs-ticket:
        description: "Create SLVS integration ticket"
        required: false
        type: boolean
        default: false
      create-slvscode-ticket:
        description: "Create SLVSCODE integration ticket"
        required: false
        type: boolean
        default: false
      create-sle-ticket:
        description: "Create SLE integration ticket"
        required: false
        type: boolean
        default: false
      create-sli-ticket:
        description: "Create SLI integration ticket"
        required: false
        type: boolean
        default: false
      create-cli-ticket:
        description: "Create CLI integration ticket"
        required: false
        type: boolean
        default: false
      sq-cli-short-description:
        description: "Short summary of SQ CLI related changes."
        required: false
        type: string
      sqs-integration:
        description: "Creat SQS integration ticket and PR"
        required: false
        type: boolean
        default: true
      sqc-integration:
        description: "Creat SQC integration ticket and PR"
        required: false
        type: boolean
        default: true
      sqaa-integration:
        description: "Create SQAA PR in sonar-analysis-as-a-service when sqc-integration is true"
        required: false
        type: boolean
        default: true
      sqc-plugins-deployer-integration:
        description: "Also create a PR in sonar-plugins-deployer when sqc-integration is true. Disabled by default during the transition period."
        required: false
        type: boolean
        default: false
      runner-environment:
        description: "Environment where the workflow will run"
        required: false
        type: string
        default: "sonar-m"
      release-process:
        description: "Release process documentation URL"
        required: false
        type: string
        default: "https://xtranet-sonarsource.atlassian.net/wiki/x/YtoL" # general Release Procedures page
      verbose:
        description: "Emit job summaries"
        required: false
        type: boolean
        default: false
      freeze-branch:
        description: "Freeze the branch during the release"
        required: false
        type: boolean
        default: true
      freeze-branch-slack-notification:
        description: "Send Slack notification when freezing/unfreezing the branch"
        required: false
        type: boolean
        default: true
      check-releasability:
        description: "Check the releasability status after freezing the branch"
        required: false
        type: boolean
        default: true
      require-rule-metadata-update:
        description: "Run rule metadata update check before release. Fails the release if metadata changes are detected and need to be merged first."
        required: false
        type: boolean
        default: false
      slack-channel:
        description: "Slack channel for notifications"
        required: false
        type: string
      issue-categories:
        description: "Jira issue categories to include in the release notes"
        required: false
        type: string
        default: "Feature,False Positive,False Negative,Bug,Security"
      bump-version:
        description: "Whether to bump the version after the release. If false, the workflow will just output the next version without modifying any files."
        required: false
        type: boolean
        default: false
      bump-version-normalize:
        description: "If true, the version will have full major.minor.patch format, otherwise the final .0 is dropped."
        required: false
        type: boolean
        default: false
      bump-version-pr-labels:
        description: "Labels to apply to the version bump pull request if bump-version is true. For example, 'update-next-dev,skip-qa'."
        required: false
        type: string
      bump-version-exclusions:
        description: "Comma-separated list of module to exclude from the version bump commit."
        required: false
        type: string
      bump-version-tool:
        description: "Version bumping tool to use. Supported values: 'maven'. Leave empty to use the default shell-based solution."
        required: false
        type: string
      release-artifacts-public:
        description: "Newline-separated Repox public artifact paths to attach to the release. Use {version} as placeholder."
        required: false
        type: string
      release-artifacts-private:
        description: "Newline-separated Repox private artifact paths to attach to the release. Use {version} as placeholder."
        required: false
        type: string

    outputs:
      new-version:
        description: "New version to release"
        value: ${{ jobs.release-in-jira.outputs.new-version }}
      release-version:
        description: "Released version in major.minor.patch.build format"
        value: ${{ jobs.prepare-release.outputs.release-version }}
      jira-release-url:
        description: "URL of the Jira release page"
        value: ${{ jobs.prepare-release.outputs.jira-release-url }}
      release-ticket-url:
        description: "URL of the Jira REL release ticket"
        value: ${{ jobs.create-release-ticket.outputs.release-ticket-url }}
      github-release-url:
        description: "URL of the published GitHub release"
        value: ${{ jobs.publish-github-release.outputs.github-release-url }}
      sqs-ticket-url:
        description: "URL of the SQS integration ticket"
        value: ${{ jobs.create-integration-tickets.outputs.sqs-ticket-url }}
      sqc-ticket-url:
        description: "URL of the SQC integration ticket"
        value: ${{ jobs.create-integration-tickets.outputs.sqc-ticket-url }}
      sqs-pull-request-url:
        description: "URL of the SQS analyzer-update pull request"
        value: ${{ jobs.update-analyzers.outputs.sqs-pull-request-url }}
      sqc-pull-request-url:
        description: "URL of the SQC analyzer-update pull request"
        value: ${{ jobs.update-analyzers.outputs.sqc-pull-request-url }}
      plugins-deployer-pull-request-url:
        description: "URL of the plugins-deployer pull request"
        value: ${{ jobs.update-analyzers.outputs.plugins-deployer-pull-request-url }}
      sqaa-pull-request-url:
        description: "URL of the SQAA analyzer-update pull request"
        value: ${{ jobs.update-analysis-as-a-service.outputs.pull-request-url }}
      bump-version-pull-request-url:
        description: "URL of the version-bump pull request"
        value: ${{ jobs.bump-version.outputs.pull-request-url }}
env:
  JIRA_PROJECT_KEY: ${{ inputs.jira-project-key }}
  USE_JIRA_SANDBOX: ${{ inputs.use-jira-sandbox == true && 'true' || 'false' }}

jobs:
  # Strip auto-merge from every open PR before the release touches anything.
  # Only runs when bump-version is true: the auto-merge race only exists when a version-bump PR
  # will be created. A pre-approved PR with auto-merge + pending CI could merge mid-release
  # before the bump PR opens; stripping auto-merge up front closes that window.
  disable-auto-merge:
    name: Disable auto-merge on open PRs
    if: ${{ inputs.bump-version }}
    runs-on: ${{ inputs.runner-environment }}
    permissions:
      pull-requests: write
    steps:
      - name: Disable auto-merge on open PRs with auto-merge enabled
        shell: bash
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: |
          pr_numbers=$(gh pr list --state open --json number,autoMergeRequest \
            --jq '.[] | select(.autoMergeRequest != null) | .number')
          if [ -z "$pr_numbers" ]; then
            echo "No open PRs with auto-merge enabled."
            exit 0
          fi
          for pr in $pr_numbers; do
            echo "Disabling auto-merge on PR #$pr"
            gh pr merge "$pr" --disable-auto-merge
          done
          echo "Auto-merge sweep complete."

  # Post release-lock=failure to all open PRs as soon as the release starts, closing the window
  # between release trigger and bump PR creation where non-bump PRs could otherwise merge freely.
  # Runs in parallel with disable-auto-merge and freeze-branch.
  # When the bump PR opens, release-lock.yml re-fires and refines the statuses (bump PR → success,
  # others stay failure). On bump PR close, release-lock.yml resets all to success.
  set-release-lock:
    name: Set release-lock on open PRs
    if: ${{ inputs.bump-version }}
    runs-on: ${{ inputs.runner-environment }}
    permissions:
      statuses: write
      pull-requests: read
    steps:
      - name: Post release-lock failure to all open PRs
        shell: bash
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          prs=$(gh pr list --state open --json number,headRefOid --jq '.[]')
          if [ -z "$prs" ]; then
            echo "No open PRs found."
            exit 0
          fi
          echo "$prs" | while IFS= read -r pr_json; do
            pr_number=$(echo "$pr_json" | jq -r '.number')
            sha=$(echo "$pr_json" | jq -r '.headRefOid')
            echo "Setting release-lock=failure on PR #$pr_number ($sha)"
            gh api --method POST "repos/$REPO/statuses/$sha" \
              -f state=failure \
              -f context=release-lock \
              -f description="Release in progress — merge the version-bump PR first"
          done
          echo "Release-lock sweep complete."

  # This job freezes the specified branch to prevent changes during the release process.
  freeze-branch:
    name: Freeze ${{ inputs.branch }} branch
    if: ${{ inputs.freeze-branch }}
    runs-on: ${{ inputs.runner-environment }}
    permissions:
      id-token: write
    steps:
      - name: Freeze branch
        uses: SonarSource/release-github-actions/lock-branch@2a5ddd698dd3992bf592cf454a04da8fc99fecc5
        with:
          branch: ${{ inputs.branch }}
          freeze: true
          slack-channel: ${{ inputs.freeze-branch-slack-notification == true && inputs.slack-channel || '' }}
      - name: Summary
        if: ${{ inputs.verbose }}
        shell: bash
        env:
          BRANCH: ${{ inputs.branch }}
          SLACK_CHANNEL: ${{ inputs.slack-channel || 'not set' }}
        run: |
          echo "## 🧊 Freeze Branch" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### What happened" >> $GITHUB_STEP_SUMMARY
          echo "- Locked branch pattern \`$BRANCH\` to prevent changes during the release." >> $GITHUB_STEP_SUMMARY
          echo "- Notifications sent to Slack channel: \`$SLACK_CHANNEL\`." >> $GITHUB_STEP_SUMMARY

  # This job executes the releasability check on the branch to ensure it is ready for release.
  # Running this check early prevents unnecessary work (like creating REL tickets) if the release cannot proceed.
  check-releasability:
    name: Check Releasability
    if: |
      inputs.check-releasability &&
      !cancelled() &&
      (needs.freeze-branch.result == 'success' || needs.freeze-branch.result == 'skipped')
    needs: [ freeze-branch ]
    runs-on: ${{ inputs.runner-environment }}
    permissions:
      id-token: write
      contents: read
      statuses: read
    outputs:
      release-version: ${{ steps.get-version.outputs.release-version }}
    steps:
      - name: Get Release Version
        id: get-version
        uses: SonarSource/release-github-actions/get-release-version@v1
        with:
          branch: ${{ inputs.branch }}

      - uses: SonarSource/gh-action_releasability@v3
        id: releasability
        with:
          branch: ${{ github.ref_name }}
          commit-sha: ${{ github.sha }}
          organization: ${{ github.repository_owner }}
          repository: ${{ github.event.repository.name }}
          version: ${{ steps.get-version.outputs.release-version }}

      - name: Summary
        if: ${{ always() && inputs.verbose }}
        shell: bash
        env:
          BRANCH: ${{ inputs.branch }}
          VERSION: ${{ steps.get-version.outputs.release-version }}
          CHECK_OUTCOME: ${{ steps.releasability.outcome }}
          CHECK_DEPENDENCIES: ${{ steps.releasability.outputs.releasabilityCheckDependencies }}
          CHECK_QA: ${{ steps.releasability.outputs.releasabilityQA }}
          CHECK_JIRA: ${{ steps.releasability.outputs.releasabilityJira }}
          CHECK_PEACHEE: ${{ steps.releasability.outputs.releasabilityCheckPeacheeLanguagesStatistics }}
          CHECK_QUALITY_GATE: ${{ steps.releasability.outputs.releasabilityQualityGate }}
          CHECK_PARENT_POM: ${{ steps.releasability.outputs.releasabilityParentPOM }}
          CHECK_GITHUB: ${{ steps.releasability.outputs.releasabilityGitHub }}
          CHECK_MANIFEST: ${{ steps.releasability.outputs.releasabilityCheckManifestValues }}
          CHECK_LICENSES: ${{ steps.releasability.outputs.releasabilityCheckLicenses }}
        run: |
          if [ "$CHECK_OUTCOME" = "success" ]; then
            echo "## ✅ Releasability Check" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ❌ Releasability Check Failed" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### What happened" >> $GITHUB_STEP_SUMMARY
          echo "- Executed releasability check on branch \`$BRANCH\` for version \`$VERSION\`." >> $GITHUB_STEP_SUMMARY
          if [ "$CHECK_OUTCOME" != "success" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Failed Checks" >> $GITHUB_STEP_SUMMARY
            [ "$CHECK_DEPENDENCIES" = "FAILED" ] && echo "- ❌ CheckDependencies" >> $GITHUB_STEP_SUMMARY
            [ "$CHECK_QA" = "FAILED" ] && echo "- ❌ QA" >> $GITHUB_STEP_SUMMARY
            [ "$CHECK_JIRA" = "FAILED" ] && echo "- ❌ Jira" >> $GITHUB_STEP_SUMMARY
            [ "$CHECK_PEACHEE" = "FAILED" ] && echo "- ❌ CheckPeacheeLanguagesStatistics" >> $GITHUB_STEP_SUMMARY
            [ "$CHECK_QUALITY_GATE" = "FAILED" ] && echo "- ❌ QualityGate" >> $GITHUB_STEP_SUMMARY
            [ "$CHECK_PARENT_POM" = "FAILED" ] && echo "- ❌ ParentPOM" >> $GITHUB_STEP_SUMMARY
            [ "$CHECK_GITHUB" = "FAILED" ] && echo "- ❌ GitHub" >> $GITHUB_STEP_SUMMARY
            [ "$CHECK_MANIFEST" = "FAILED" ] && echo "- ❌ CheckManifestValues" >> $GITHUB_STEP_SUMMARY
            [ "$CHECK_LICENSES" = "FAILED" ] && echo "- ❌ CheckLicenses" >> $GITHUB_STEP_SUMMARY
          fi

  # This job runs the rule metadata update check to ensure metadata is up to date before release.
  # If changes are detected, a PR is created and the release is blocked until it is merged.
  update-rule-metadata:
    name: Update Rule Metadata
    if: |
      inputs.require-rule-metadata-update &&
      !cancelled() &&
      (needs.check-releasability.result == 'success' || needs.check-releasability.result == 'skipped')
    needs: [ check-releasability ]
    runs-on: ${{ inputs.runner-environment }}
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Update Rule Metadata
        id: update-rule-metadata
        uses: SonarSource/release-github-actions/update-rule-metadata@v1
        with:
          branch: ${{ inputs.branch }}

      - name: Check Rule Metadata Changes
        if: steps.update-rule-metadata.outputs.has-changes == 'true'
        shell: bash
        env:
          PR_URL: ${{ steps.update-rule-metadata.outputs.pull-request-url }}
        run: |
          echo "::error::Rule metadata changes detected. The generated PR needs to be merged first before continuing with the release."
          echo "::error::Pull Request URL: $PR_URL"
          echo "::error::Please merge the PR and run this workflow again (start a new run instead of re-running failed jobs)."
          exit 1

      - name: Summary
        if: ${{ inputs.verbose }}
        shell: bash
        env:
          BRANCH: ${{ inputs.branch }}
          HAS_CHANGES: ${{ steps.update-rule-metadata.outputs.has-changes }}
          PR_URL: ${{ steps.update-rule-metadata.outputs.pull-request-url || 'none' }}
        run: |
          echo "## 📋 Update Rule Metadata" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### What happened" >> $GITHUB_STEP_SUMMARY
          echo "- Ran rule metadata update check on branch \`$BRANCH\`." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Results" >> $GITHUB_STEP_SUMMARY
          echo "- Changes detected: \`$HAS_CHANGES\`." >> $GITHUB_STEP_SUMMARY
          if [ "$HAS_CHANGES" = "true" ]; then
            echo "- Pull Request: $PR_URL" >> $GITHUB_STEP_SUMMARY
          fi

  # This step determines the release version, Jira version name, and gathers release notes.
  # It sets up the necessary outputs for subsequent steps.
  # These outputs include the release version, Jira version name, release notes, Jira release notes, and Jira release URL.
  prepare-release:
    name: Prepare Release
    needs: [ check-releasability, update-rule-metadata ]
    if: |
      !cancelled() &&
      (needs.check-releasability.result == 'success' || needs.check-releasability.result == 'skipped') &&
      (needs.update-rule-metadata.result == 'success' || needs.update-rule-metadata.result == 'skipped')
    runs-on: ${{ inputs.runner-environment }}
    permissions:
      statuses: read
      contents: read
      id-token: write
    outputs:
      release-version: ${{ needs.check-releasability.outputs.release-version || steps.get-release-version.outputs.release-version }}
      jira-version-name: ${{ steps.get-jira-version.outputs.jira-version-name }}
      release-notes: ${{ inputs.release-notes != '' && inputs.release-notes || steps.get-jira-release-notes.outputs.release-notes }}
      jira-release-notes: ${{ inputs.release-notes != '' && inputs.release-notes || steps.get-jira-release-notes.outputs.jira-release-notes }}
      jira-release-url: ${{ steps.get-jira-release-notes.outputs.jira-release-url }}
      jira-release-issue-filter-url: ${{ steps.get-jira-release-notes.outputs.jira-release-issue-filter-url }}
    steps:
      - name: Get Release Version
        id: get-release-version
        if: ${{ needs.check-releasability.result == 'skipped' }}
        uses: SonarSource/release-github-actions/get-release-version@v1
        with:
          branch: ${{ inputs.branch }}

      - name: Get Jira Version
        id: get-jira-version
        uses: SonarSource/release-github-actions/get-jira-version@v1

      - name: Get Jira Release Notes
        id: get-jira-release-notes
        if: inputs.release-notes == ''
        uses: SonarSource/release-github-actions/get-jira-release-notes@v1
        with:
          issue-types: ${{ inputs.issue-categories }}

      - name: Summary
        if: ${{ inputs.verbose }}
        shell: bash
        env:
          BRANCH: ${{ inputs.branch }}
          JIRA_PROJECT_KEY: ${{ inputs.jira-project-key }}
          USE_JIRA_SANDBOX: ${{ inputs.use-jira-sandbox == true && 'true' || 'false' }}
          RELEASE_NOTES: ${{ inputs.release-notes }}
        run: |
          echo "## 🆗 Prepare Release" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### What happened" >> $GITHUB_STEP_SUMMARY
          echo "- Determined the release version from branch \`$BRANCH\`." >> $GITHUB_STEP_SUMMARY
          echo "- Retrieved the Jira version name for project \`$JIRA_PROJECT_KEY\` (sandbox: \`$USE_JIRA_SANDBOX\`)." >> $GITHUB_STEP_SUMMARY
          if [ "$RELEASE_NOTES" != "" ]; then
            echo "- Used release notes provided by the caller." >> $GITHUB_STEP_SUMMARY
          else
            echo "- Generated release notes from Jira." >> $GITHUB_STEP_SUMMARY
            echo "  - See Jira release: ${{ steps.get-jira-release-notes.outputs.jira-release-url }}" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Results" >> $GITHUB_STEP_SUMMARY
          echo "- Release version: \`${{ needs.check-releasability.outputs.release-version || steps.get-release-version.outputs.release-version }}\`." >> $GITHUB_STEP_SUMMARY
          echo "- Jira version name: \`${{ steps.get-jira-version.outputs.jira-version-name }}\`." >> $GITHUB_STEP_SUMMARY

  # This step creates a Jira release ticket using the prepared release information.
  # It outputs the release ticket key and URL for further use.
  create-release-ticket:
    name: Create Release Ticket
    runs-on: ${{ inputs.runner-environment }}
    needs: prepare-release
    if: ${{ !cancelled() && needs.prepare-release.result == 'success' }}
    permissions:
      statuses: read
      contents: read
      id-token: write
    outputs:
      release-ticket-key: ${{ steps.create-ticket.outputs.release-ticket-key }}
      release-ticket-url: ${{ steps.create-ticket.outputs.release-ticket-url }}
    steps:
      - name: Create Jira Release Ticket
        id: create-ticket
        uses: SonarSource/release-github-actions/create-jira-release-ticket@v1
        with:
          project-name: ${{ inputs.project-name }}
          short-description: ${{ inputs.short-description }}
          rule-props-changed: ${{ inputs.rule-props-changed == 'true' && 'Yes' || 'No' }}
          jira-release-url: ${{ needs.prepare-release.outputs.jira-release-issue-filter-url }}
          start-progress: true
          version: ${{ needs.prepare-release.outputs.release-version }}

      - name: Summary
        if: ${{ inputs.verbose }}
        shell: bash
        env:
          PROJECT_NAME: ${{ inputs.project-name }}
          RULE_PROPS_CHANGED: ${{ inputs.rule-props-changed }}
        run: |
          echo "## 🧾 Create Release Ticket" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### What happened" >> $GITHUB_STEP_SUMMARY
          echo "- Created a Jira release ticket for project \`$PROJECT_NAME\` using version \`${{ needs.prepare-release.outputs.release-version }}\`." >> $GITHUB_STEP_SUMMARY
          echo "- Rule properties changed: \`$RULE_PROPS_CHANGED\`." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Results" >> $GITHUB_STEP_SUMMARY
          echo "- Ticket key: \`${{ steps.create-ticket.outputs.release-ticket-key }}\`." >> $GITHUB_STEP_SUMMARY
          echo "- Ticket link: ${{ steps.create-ticket.outputs.release-ticket-url }}" >> $GITHUB_STEP_SUMMARY

  # This step publishes the GitHub release using the prepared release information and the created Jira release ticket.
  # It outputs the GitHub release URL for further use.
  publish-github-release:
    name: Publish Github Release
    runs-on: ${{ inputs.runner-environment }}
    needs: [ prepare-release, create-release-ticket ]
    if: ${{ !cancelled() && needs.prepare-release.result == 'success' && needs.create-release-ticket.result == 'success' }}
    permissions:
      id-token: write
      contents: write
      actions: write
    outputs:
      github-release-url: ${{ steps.publish-github-release.outputs.release-url}}
    steps:
      - name: Publish GitHub Release
        id: publish-github-release
        uses: SonarSource/release-github-actions/publish-github-release@v1
        with:
          release-version: ${{ needs.prepare-release.outputs.release-version }}
          release-notes: ${{ inputs.release-notes != '' && inputs.release-notes || needs.prepare-release.outputs.release-notes }}
          draft: ${{ inputs.is-draft-release }}
          branch: ${{ inputs.branch }}
          release-artifacts-public: ${{ inputs.release-artifacts-public }}
          release-artifacts-private: ${{ inputs.release-artifacts-private }}

      - name: Summary
        if: ${{ inputs.verbose }}
        shell: bash
        env:
          BRANCH: ${{ inputs.branch }}
          IS_DRAFT_RELEASE: ${{ inputs.is-draft-release == true && 'true' || 'false' }}
        run: |
          echo "## 📦 Publish GitHub Release" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### What happened" >> $GITHUB_STEP_SUMMARY
          echo "- Published a GitHub release for version \`${{ needs.prepare-release.outputs.release-version }}\` from branch \`$BRANCH\`." >> $GITHUB_STEP_SUMMARY
          echo "- Draft release: \`$IS_DRAFT_RELEASE\`." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Results" >> $GITHUB_STEP_SUMMARY
          echo "- Release page: ${{ steps.publish-github-release.outputs.release-url }}" >> $GITHUB_STEP_SUMMARY

  # This job unfreezes the specified branch after the GitHub release is published.
  unfreeze-branch:
    name: Unfreeze ${{ inputs.branch }} branch
    if: ${{ always() && inputs.freeze-branch }}
    runs-on: ${{ inputs.runner-environment }}
    needs: [ publish-github-release ]
    permissions:
      id-token: write
    steps:
      - name: Unfreeze branch
        uses: SonarSource/release-github-actions/lock-branch@2a5ddd698dd3992bf592cf454a04da8fc99fecc5
        with:
          branch: ${{ inputs.branch }}
          freeze: false
          slack-channel: ${{ inputs.freeze-branch-slack-notification == true && inputs.slack-channel || '' }}
      - name: Summary
        if: ${{ inputs.verbose }}
        shell: bash
        env:
          BRANCH: ${{ inputs.branch }}
          SLACK_CHANNEL: ${{ inputs.slack-channel || 'not set' }}
        run: |
          echo "## 🔓 Unfreeze Branch" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### What happened" >> $GITHUB_STEP_SUMMARY
          echo "- Unlocked branch pattern \`$BRANCH\` after publishing the GitHub release." >> $GITHUB_STEP_SUMMARY
          echo "- Notifications sent to Slack channel: \`$SLACK_CHANNEL\`." >> $GITHUB_STEP_SUMMARY

  # This step releases the version in Jira and moves the release ticket to the "Technical Release Done" status.
  # It outputs the new version name and integration ticket keys and URLs.
  release-in-jira:
    name: Release Version In Jira
    runs-on: ${{ inputs.runner-environment }}
    needs: [ prepare-release, publish-github-release, create-release-ticket ]
    if: |
      !cancelled() && 
      needs.prepare-release.result == 'success' &&
      needs.publish-github-release.result == 'success' &&
      needs.create-release-ticket.result == 'success'
    permissions:
      statuses: read
      contents: read
      id-token: write
    outputs:
      new-version: ${{ steps.create-jira-version.outputs.jira-new-version-name }}
    steps:
      - name: Release in Jira
        uses: SonarSource/release-github-actions/release-jira-version@v1
        with:
          jira-version-name: ${{ needs.prepare-release.outputs.jira-version-name }}
      - name: Create new release in jira
        id: create-jira-version
        uses: SonarSource/release-github-actions/create-jira-version@v1
        with:
          jira-version-name: ${{ needs.prepare-release.outputs.jira-version-name }}
          jira-new-version-name: ${{ inputs.new-version }}
      - name: Move release ticket to Technical release Done
        uses: SonarSource/release-github-actions/update-release-ticket-status@v1
        with:
          release-ticket-key: ${{ needs.create-release-ticket.outputs.release-ticket-key }}
          status: "Technical Release Done"
          assignee: ${{ inputs.pm-email }}

      - name: Summary
        if: ${{ inputs.verbose }}
        shell: bash
        env:
          NEW_VERSION: ${{ inputs.new-version || 'not specified, autoincrement minor version' }}
          PM_EMAIL: ${{ inputs.pm-email }}
        run: |
          echo "## 🗂️ Release in Jira" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### What happened" >> $GITHUB_STEP_SUMMARY
          echo "- Released current Jira version \`${{ needs.prepare-release.outputs.jira-version-name }}\`." >> $GITHUB_STEP_SUMMARY
          echo "- Created new Jira version named \`$NEW_VERSION\`." >> $GITHUB_STEP_SUMMARY
          echo "- Moved the release ticket to \"Technical Release Done\" and assigned it to \`$PM_EMAIL\`." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Results" >> $GITHUB_STEP_SUMMARY
          echo "- New Jira version: \`${{ steps.create-jira-version.outputs.jira-new-version-name }}\`." >> $GITHUB_STEP_SUMMARY

  # This step bumps the version in the codebase and creates a pull request for the next development iteration.
  bump-version:
    name: Bump Version
    needs: [ release-in-jira ]
    if: ${{ inputs.bump-version && !cancelled() && needs.release-in-jira.result == 'success' }}
    runs-on: ${{ inputs.runner-environment }}
    permissions:
      id-token: write
      contents: write
      pull-requests: write
    outputs:
      pull-request-url: ${{ steps.bump.outputs.pull-request-url }}
    steps:
      # Convert the version returned by release-in-jira to the full "major.minor.patch" format
      # (it drops the patch if it is 0).
      - name: Normalize Version
        id: normalize
        if: ${{ inputs.bump-version-normalize }}
        shell: bash
        run: |
          INPUT="${{ needs.release-in-jira.outputs.new-version }}"
          if [[ $INPUT =~ ^[0-9]+\.[0-9]+$ ]]; then
            OUTPUT="${INPUT}.0"
          else
            OUTPUT="$INPUT"
          fi
          echo "version=${OUTPUT}" >> "$GITHUB_OUTPUT"

      - name: Bump version and create PR
        id: bump
        uses: SonarSource/release-github-actions/bump-version@v1
        with:
          version: ${{ steps.normalize.outputs.version || needs.release-in-jira.outputs.new-version }}
          pr-labels: ${{ inputs.bump-version-pr-labels }}
          excluded-modules: ${{ inputs.bump-version-exclusions }}
          base-branch: ${{ inputs.branch }}
          tool: ${{ inputs.bump-version-tool }}

  # This step creates integration tickets in various Jira projects based on the inputs provided.
  # It creates tickets for SLVS, SLVSCODE, SLE, SLI, SQC, and SQS as specified.
  # It outputs the integration ticket keys for SQC and SQS for further use.
  create-integration-tickets:
    name: Create Integration Tickets
    needs: [ prepare-release, publish-github-release, create-release-ticket ]
    if: |
      (inputs.create-slvs-ticket || inputs.create-slvscode-ticket || inputs.create-sle-ticket || inputs.create-sli-ticket || inputs.create-cli-ticket || inputs.sqc-integration || inputs.sqs-integration) && 
      !cancelled() && 
      needs.prepare-release.result == 'success' &&
      needs.publish-github-release.result == 'success' &&
      needs.create-release-ticket.result == 'success'
    permissions:
      statuses: read
      contents: read
      id-token: write
    outputs:
      sqc-ticket-key: ${{ steps.create-sqc-ticket.outputs.ticket-key }}
      sqc-ticket-url: ${{ steps.create-sqc-ticket.outputs.ticket-url }}
      sqs-ticket-key: ${{ steps.create-sqs-ticket.outputs.ticket-key }}
      sqs-ticket-url: ${{ steps.create-sqs-ticket.outputs.ticket-url }}
    runs-on: ${{ inputs.runner-environment }}
    steps:
      - name: Create SLVS Ticket
        if: ${{ inputs.create-slvs-ticket }}
        uses: SonarSource/release-github-actions/create-integration-ticket@v1
        with:
          plugin-name: ${{ inputs.plugin-name }}
          release-version: ${{ needs.prepare-release.outputs.release-version }}
          release-ticket-key: ${{ needs.create-release-ticket.outputs.release-ticket-key }}
          target-jira-project: "SLVS"
          ticket-description: ${{ inputs.sq-ide-short-description != '' && inputs.sq-ide-short-description || inputs.short-description }}
          jira-release-url: ${{ needs.prepare-release.outputs.jira-release-url }}

      - name: Create SLVSCODE Ticket
        if: ${{ inputs.create-slvscode-ticket }}
        uses: SonarSource/release-github-actions/create-integration-ticket@v1
        with:
          plugin-name: ${{ inputs.plugin-name }}
          release-version: ${{ needs.prepare-release.outputs.release-version }}
          release-ticket-key: ${{ needs.create-release-ticket.outputs.release-ticket-key }}
          target-jira-project: "SLVSCODE"
          ticket-description: ${{ inputs.sq-ide-short-description != '' && inputs.sq-ide-short-description || inputs.short-description }}
          jira-release-url: ${{ needs.prepare-release.outputs.jira-release-url }}

      - name: Create SLE Ticket
        if: ${{ inputs.create-sle-ticket }}
        uses: SonarSource/release-github-actions/create-integration-ticket@v1
        with:
          plugin-name: ${{ inputs.plugin-name }}
          release-version: ${{ needs.prepare-release.outputs.release-version }}
          release-ticket-key: ${{ needs.create-release-ticket.outputs.release-ticket-key }}
          target-jira-project: "SLE"
          ticket-description: ${{ inputs.sq-ide-short-description != '' && inputs.sq-ide-short-description || inputs.short-description }}
          jira-release-url: ${{ needs.prepare-release.outputs.jira-release-url }}

      - name: Create SLI Ticket
        if: ${{ inputs.create-sli-ticket }}
        uses: SonarSource/release-github-actions/create-integration-ticket@v1
        with:
          plugin-name: ${{ inputs.plugin-name }}
          release-version: ${{ needs.prepare-release.outputs.release-version }}
          release-ticket-key: ${{ needs.create-release-ticket.outputs.release-ticket-key }}
          target-jira-project: "SLI"
          ticket-description: ${{ inputs.sq-ide-short-description != '' && inputs.sq-ide-short-description || inputs.short-description }}
          jira-release-url: ${{ needs.prepare-release.outputs.jira-release-url }}

      - name: Create CLI Ticket
        if: ${{ inputs.create-cli-ticket }}
        uses: SonarSource/release-github-actions/create-integration-ticket@v1
        with:
          plugin-name: ${{ inputs.plugin-name }}
          release-version: ${{ needs.prepare-release.outputs.release-version }}
          release-ticket-key: ${{ needs.create-release-ticket.outputs.release-ticket-key }}
          target-jira-project: "CLI"
          ticket-description: ${{ inputs.sq-cli-short-description != '' && inputs.sq-cli-short-description || inputs.short-description }}
          jira-release-url: ${{ needs.prepare-release.outputs.jira-release-url }}

      - name: Resolve KTLO Epic
        if: ${{ inputs.sqc-integration || inputs.sqs-integration }}
        id: resolve-ktlo-epic
        uses: SonarSource/release-github-actions/resolve-ktlo-epic@v1
        with:
          jira-project: ${{ inputs.ktlo-jira-project-key || inputs.jira-project-key }}
          epic-name-pattern: ${{ inputs.ktlo-epic-name-pattern || 'KTLO' }}
          use-jira-sandbox: ${{ inputs.use-jira-sandbox }}

      - name: Create SQC Ticket
        if: ${{ inputs.sqc-integration }}
        id: create-sqc-ticket
        uses: SonarSource/release-github-actions/create-integration-ticket@v1
        with:
          plugin-name: ${{ inputs.plugin-name }}
          release-version: ${{ needs.prepare-release.outputs.release-version }}
          release-ticket-key: ${{ needs.create-release-ticket.outputs.release-ticket-key }}
          target-jira-project: "SC"
          ticket-description: ${{ inputs.short-description }}
          jira-release-url: ${{ needs.prepare-release.outputs.jira-release-url }}
          parent-epic: ${{ steps.resolve-ktlo-epic.outputs.epic-key }}

      - name: Create SQS Ticket
        if: ${{ inputs.sqs-integration }}
        id: create-sqs-ticket
        uses: SonarSource/release-github-actions/create-integration-ticket@v1
        with:
          plugin-name: ${{ inputs.plugin-name }}
          release-version: ${{ needs.prepare-release.outputs.release-version }}
          release-ticket-key: ${{ needs.create-release-ticket.outputs.release-ticket-key }}
          target-jira-project: "SONAR"
          ticket-description: ${{ inputs.short-description }}
          jira-release-url: ${{ needs.prepare-release.outputs.jira-release-url }}
          parent-epic: ${{ steps.resolve-ktlo-epic.outputs.epic-key }}

      - name: Summary
        if: ${{ inputs.verbose }}
        shell: bash
        env:
          PLUGIN_NAME: ${{ inputs.plugin-name }}
          CREATE_SLVS_TICKET: ${{ inputs.create-slvs-ticket == true && 'true' || 'false' }}
          CREATE_SLVSCODE_TICKET: ${{ inputs.create-slvscode-ticket == true && 'true' || 'false' }}
          CREATE_SLE_TICKET: ${{ inputs.create-sle-ticket == true && 'true' || 'false' }}
          CREATE_SLI_TICKET: ${{ inputs.create-sli-ticket == true && 'true' || 'false' }}
          CREATE_CLI_TICKET: ${{ inputs.create-cli-ticket == true && 'true' || 'false' }}
          SQC_INTEGRATION: ${{ inputs.sqc-integration == true && 'true' || 'false' }}
          SQS_INTEGRATION: ${{ inputs.sqs-integration == true && 'true' || 'false' }}
        run: |
          echo "## 🔗 Create Integration Tickets" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### What happened" >> $GITHUB_STEP_SUMMARY
          echo "- Based on flags, created integration tickets for selected projects." >> $GITHUB_STEP_SUMMARY
          echo "- Plugin: \`$PLUGIN_NAME\`, Release ticket: \`${{ needs.create-release-ticket.outputs.release-ticket-key }}\`." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Results" >> $GITHUB_STEP_SUMMARY
          if [ "$CREATE_SLVS_TICKET" = "true" ]; then echo "- SLVS ticket created." >> $GITHUB_STEP_SUMMARY; fi
          if [ "$CREATE_SLVSCODE_TICKET" = "true" ]; then echo "- SLVSCODE ticket created." >> $GITHUB_STEP_SUMMARY; fi
          if [ "$CREATE_SLE_TICKET" = "true" ]; then echo "- SLE ticket created." >> $GITHUB_STEP_SUMMARY; fi
          if [ "$CREATE_SLI_TICKET" = "true" ]; then echo "- SLI ticket created." >> $GITHUB_STEP_SUMMARY; fi
          if [ "$CREATE_CLI_TICKET" = "true" ]; then echo "- CLI ticket created." >> $GITHUB_STEP_SUMMARY; fi
          if [ "$SQC_INTEGRATION" = "true" ]; then echo "- SQC ticket \`${{ steps.create-sqc-ticket.outputs.ticket-key }}\` — ${{ steps.create-sqc-ticket.outputs.ticket-url }}" >> $GITHUB_STEP_SUMMARY; fi
          if [ "$SQS_INTEGRATION" = "true" ]; then echo "- SQS ticket \`${{ steps.create-sqs-ticket.outputs.ticket-key }}\` — ${{ steps.create-sqs-ticket.outputs.ticket-url }}" >> $GITHUB_STEP_SUMMARY; fi

  # This step updates the analyzers in SQS and SQC by creating pull requests based on the integration tickets created in the previous step.
  # It outputs the pull request URLs for SQS and SQC for further use.
  update-analyzers:
    name: Update Analyzers in SQS and SQC
    runs-on: ${{ inputs.runner-environment }}
    needs: [ prepare-release, create-integration-tickets ]
    if: |
      (inputs.sqs-integration || inputs.sqc-integration) &&
      !cancelled() && 
      needs.prepare-release.result == 'success' &&
      needs.create-integration-tickets.result == 'success'
    permissions:
      id-token: write
    outputs:
      sqs-pull-request-url: ${{ steps.update-sqs.outputs.pull-request-url }}
      sqc-pull-request-url: ${{ steps.update-sqc.outputs.pull-request-url }}
      plugins-deployer-pull-request-url: ${{ steps.update-plugins-deployer.outputs.pull-request-url }}
    steps:
      - name: Update analyzer in SQS
        id: update-sqs
        if: ${{ inputs.sqs-integration }}
        uses: SonarSource/release-github-actions/update-analyzer@v1
        with:
          release-version: ${{ needs.prepare-release.outputs.release-version }}
          ticket-key: ${{ needs.create-integration-tickets.outputs.sqs-ticket-key }}
          plugin-name: ${{ inputs.plugin-name }}
          secret-name: ${{ inputs.release-automation-secret-name || format('sonar-{0}-release-automation', inputs.plugin-name) }}
          plugin-artifacts: ${{inputs.plugin-artifacts-sqs }}
          draft: ${{ inputs.is-draft-release }}
          reviewers: ${{ github.actor }}

      - name: Update analyzer in SQC
        id: update-sqc
        if: ${{ inputs.sqc-integration }}
        uses: SonarSource/release-github-actions/update-analyzer@v1
        with:
          release-version: ${{ needs.prepare-release.outputs.release-version }}
          ticket-key: ${{ needs.create-integration-tickets.outputs.sqc-ticket-key }}
          plugin-name: ${{ inputs.plugin-name }}
          secret-name: ${{ inputs.release-automation-secret-name || format('sonar-{0}-release-automation', inputs.plugin-name) }}
          plugin-artifacts: ${{inputs.plugin-artifacts-sqc }}
          draft: ${{ inputs.is-draft-release }}
          reviewers: ${{ github.actor }}

      - name: Update analyzer in sonar-plugins-deployer
        id: update-plugins-deployer
        if: ${{ inputs.sqc-integration && inputs.sqc-plugins-deployer-integration }}
        uses: SonarSource/release-github-actions/update-plugins-deployer@v1
        with:
          release-version: ${{ needs.prepare-release.outputs.release-version }}
          ticket-key: ${{ needs.create-integration-tickets.outputs.sqc-ticket-key }}
          plugin-name: ${{ inputs.plugin-name }}
          secret-name: ${{ inputs.release-automation-secret-name || format('sonar-{0}-release-automation', inputs.plugin-name) }}
          draft: ${{ inputs.is-draft-release }}
          reviewers: ${{ github.actor }}

      - name: Summary
        if: ${{ inputs.verbose }}
        shell: bash
        env:
          PLUGIN_NAME: ${{ inputs.plugin-name }}
          PLUGIN_ARTIFACTS_SQS: ${{ inputs.plugin-artifacts-sqs }}
          PLUGIN_ARTIFACTS_SQC: ${{ inputs.plugin-artifacts-sqc }}
          IS_DRAFT_RELEASE: ${{ inputs.is-draft-release == true && 'true' || 'false' }}
          RELEASE_AUTOMATION_SECRET_NAME: ${{ inputs.release-automation-secret-name }}
          SQS_INTEGRATION: ${{ inputs.sqs-integration == true && 'true' || 'false' }}
          SQC_INTEGRATION: ${{ inputs.sqc-integration == true && 'true' || 'false' }}
          SQC_PLUGINS_DEPLOYER_INTEGRATION: ${{ inputs.sqc-plugins-deployer-integration == true && 'true' || 'false' }}
        run: |
          echo "## 🔄 Update Analyzers" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### What happened" >> $GITHUB_STEP_SUMMARY
          echo "- Prepared analyzer updates and opened PRs where requested." >> $GITHUB_STEP_SUMMARY
          echo "- Artifacts SQS: \`$([ -n "$PLUGIN_ARTIFACTS_SQS" ] && echo "$PLUGIN_ARTIFACTS_SQS" || echo "$PLUGIN_NAME" )\`, Artifacts SQC: \`$([ -n "$PLUGIN_ARTIFACTS_SQC" ] && echo "$PLUGIN_ARTIFACTS_SQC" || echo "$PLUGIN_NAME" )\`." >> $GITHUB_STEP_SUMMARY
          echo "- Draft PRs: \`$IS_DRAFT_RELEASE\`, Secret present: \`$([ -n "$RELEASE_AUTOMATION_SECRET_NAME" ] && echo true || echo false)\`." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Results" >> $GITHUB_STEP_SUMMARY
          if [ "$SQS_INTEGRATION" = "true" ]; then echo "- SQS PR: ${{ steps.update-sqs.outputs.pull-request-url }}" >> $GITHUB_STEP_SUMMARY; fi
          if [ "$SQC_INTEGRATION" = "true" ]; then echo "- SQC PR: ${{ steps.update-sqc.outputs.pull-request-url }}" >> $GITHUB_STEP_SUMMARY; fi
          if [ "$SQC_INTEGRATION" = "true" ] && [ "$SQC_PLUGINS_DEPLOYER_INTEGRATION" = "true" ]; then echo "- Plugins Deployer PR: ${{ steps.update-plugins-deployer.outputs.pull-request-url }}" >> $GITHUB_STEP_SUMMARY; fi

  # This step updates analyzer versions in Analysis as a Service by creating a pull request.
  update-analysis-as-a-service:
    name: Update Analyzer in Analysis as a Service
    runs-on: ${{ inputs.runner-environment }}
    needs: [ prepare-release, create-integration-tickets ]
    if: |
      inputs.sqc-integration && inputs.sqaa-integration &&
      !cancelled() &&
      needs.prepare-release.result == 'success' &&
      needs.create-integration-tickets.result == 'success'
    permissions:
      id-token: write
    outputs:
      pull-request-url: ${{ steps.update-sqaa.outputs.pull-request-url }}
    steps:
      - name: Update analyzer in Analysis as a Service
        id: update-sqaa
        uses: SonarSource/release-github-actions/update-analysis-as-a-service@v1
        with:
          release-version: ${{ needs.prepare-release.outputs.release-version }}
          ticket-key: ${{ needs.create-integration-tickets.outputs.sqc-ticket-key }}
          plugin-name: ${{ inputs.plugin-name }}
          secret-name: ${{ inputs.release-automation-secret-name || format('sonar-{0}-release-automation', inputs.plugin-name) }}
          plugin-artifacts: ${{ inputs.plugin-artifacts-sqaa }}
          base-branch: ${{ inputs.sqaa-base-branch }}
          draft: ${{ inputs.is-draft-release }}
          reviewers: ${{ inputs.sqaa-reviewers }}

      - name: Summary
        if: ${{ inputs.verbose }}
        shell: bash
        env:
          PLUGIN_NAME: ${{ inputs.plugin-name }}
          PLUGIN_ARTIFACTS_SQAA: ${{ inputs.plugin-artifacts-sqaa }}
          IS_DRAFT_RELEASE: ${{ inputs.is-draft-release == true && 'true' || 'false' }}
        run: |
          echo "## 🔄 Update Analysis as a Service" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### What happened" >> $GITHUB_STEP_SUMMARY
          echo "- Prepared analyzer updates in \`sonar-analysis-as-a-service\` and opened a PR." >> $GITHUB_STEP_SUMMARY
          echo "- Artifacts SQAA: \`$([ -n "$PLUGIN_ARTIFACTS_SQAA" ] && echo "$PLUGIN_ARTIFACTS_SQAA" || echo "$PLUGIN_NAME" )\`." >> $GITHUB_STEP_SUMMARY
          echo "- Draft PR: \`$IS_DRAFT_RELEASE\`." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Results" >> $GITHUB_STEP_SUMMARY
          echo "- SQAA PR: ${{ steps.update-sqaa.outputs.pull-request-url }}" >> $GITHUB_STEP_SUMMARY

  # This step summarizes the results of the entire release process.
  # It checks the outcomes of all previous steps and generates a summary indicating whether the release was
  # successful or failed, along with relevant links and information.
  summarize-release:
    name: Release Results
    runs-on: ${{ inputs.runner-environment }}
    if: always()
    # NOTE: When adding a job to the needs list below, also add its result
    # to the RESULT_* env vars in the "Post Summary to Workflow" step.
    needs:
      - check-releasability
      - update-rule-metadata
      - prepare-release
      - publish-github-release
      - create-release-ticket
      - release-in-jira
      - bump-version
      - create-integration-tickets
      - update-analyzers
      - update-analysis-as-a-service
    env:
        RELEASE_PROCESS: ${{ inputs.release-process }}
    steps:

      - name: Create Message
        id: create-message
        shell: bash
        env:
          PROJECT_NAME: ${{ inputs.project-name }}
          RELEASE_VERSION: ${{ needs.prepare-release.outputs.release-version }}
          NEW_VERSION: ${{ needs.release-in-jira.outputs.new-version || 'not created' }}
          JIRA_RELEASE_URL: ${{ needs.prepare-release.outputs.jira-release-url || 'not resolved' }}
          RELEASE_TICKET_URL: ${{ needs.create-release-ticket.outputs.release-ticket-url || 'not created' }}
          GITHUB_RELEASE_URL: ${{ needs.publish-github-release.outputs.github-release-url || 'not created' }}
          SQS_TICKET_URL: ${{ needs.create-integration-tickets.outputs.sqs-ticket-url || 'not created' }}
          SQC_TICKET_URL: ${{ needs.create-integration-tickets.outputs.sqc-ticket-url || 'not created' }}
          SQS_PR_URL: ${{ needs.update-analyzers.outputs.sqs-pull-request-url || 'not created' }}
          SQC_PR_URL: ${{ needs.update-analyzers.outputs.sqc-pull-request-url || 'not created' }}
          PLUGINS_DEPLOYER_PR_URL: ${{ inputs.sqc-plugins-deployer-integration == true && needs.update-analyzers.outputs.plugins-deployer-pull-request-url || 'not created' }}
          SQAA_PR_URL: ${{ inputs.sqaa-integration == true && needs.update-analysis-as-a-service.outputs.pull-request-url || 'not created' }}
          BUMP_VERSION_PR_URL: ${{ needs.bump-version.outputs.pull-request-url || 'not created' }}
          RESULT_CHECK_RELEASABILITY: ${{ needs.check-releasability.result }}
          RESULT_UPDATE_RULE_METADATA: ${{ needs.update-rule-metadata.result }}
          RESULT_PREPARE_RELEASE: ${{ needs.prepare-release.result }}
          RESULT_PUBLISH_GITHUB_RELEASE: ${{ needs.publish-github-release.result }}
          RESULT_CREATE_RELEASE_TICKET: ${{ needs.create-release-ticket.result }}
          RESULT_RELEASE_IN_JIRA: ${{ needs.release-in-jira.result }}
          RESULT_BUMP_VERSION: ${{ needs.bump-version.result }}
          RESULT_CREATE_INTEGRATION_TICKETS: ${{ needs.create-integration-tickets.result }}
          RESULT_UPDATE_ANALYZERS: ${{ needs.update-analyzers.result }}
          RESULT_UPDATE_ANALYSIS_AS_A_SERVICE: ${{ needs.update-analysis-as-a-service.result }}
        run: |
          ALL_SUCCESS=true
          for result in "$RESULT_CHECK_RELEASABILITY" "$RESULT_UPDATE_RULE_METADATA" "$RESULT_PREPARE_RELEASE" "$RESULT_PUBLISH_GITHUB_RELEASE" "$RESULT_CREATE_RELEASE_TICKET" "$RESULT_RELEASE_IN_JIRA" "$RESULT_CREATE_INTEGRATION_TICKETS" "$RESULT_UPDATE_ANALYZERS" "$RESULT_UPDATE_ANALYSIS_AS_A_SERVICE" "$RESULT_BUMP_VERSION"; do
            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              ALL_SUCCESS=false
              break
            fi
          done

          {
            echo "message<<ENDOFMESSAGE"

            if [[ "$USE_JIRA_SANDBOX" == "true" ]]; then
              echo "# DRY RUN (NOT A REAL RELEASE)"
            fi

            if [[ "$ALL_SUCCESS" == "true" ]]; then
              echo "# 🎉 ${PROJECT_NAME}: Release Successful"
              echo "The automated release completed without errors. Below is a consolidated overview of the run."
            else
              echo "# ❌ ${PROJECT_NAME}: Release Failed"
              echo "One or more jobs failed. Review the job logs and links below."
            fi
            echo ""

            echo "  - Released Version: \`$RELEASE_VERSION\`"
            echo "  - Next Iteration Version: \`$NEW_VERSION\`"
            echo "  - Jira Release: $JIRA_RELEASE_URL"
            echo "  - Release Ticket: $RELEASE_TICKET_URL"
            echo "  - GitHub Release: $GITHUB_RELEASE_URL"
            echo "  - GitHub Action Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo "  - SQS Integration Ticket: $SQS_TICKET_URL"
            echo "  - SQC Integration Ticket: $SQC_TICKET_URL"
            echo "  - SQS Analyzer PR: $SQS_PR_URL"
            echo "  - SQC Analyzer PR: $SQC_PR_URL"
            echo "  - Plugins Deployer PR: $PLUGINS_DEPLOYER_PR_URL"
            echo "  - SQAA Analyzer PR: $SQAA_PR_URL"
            echo "  - Bump Version PR: $BUMP_VERSION_PR_URL"

            echo "## Guidance"
            if [[ "$ALL_SUCCESS" == "true" ]]; then
              echo "- Review and merge the bump version, SQS, SQC, Plugins Deployer, and SQAA PRs."
              echo "- Update integration ticket statuses (ensure SQS ticket fix versions are set)."
            else
              echo "- Check failed jobs for error messages and re-run as needed."
            fi
            echo "- Reference: $RELEASE_PROCESS"
            echo "ENDOFMESSAGE"
          } >> $GITHUB_OUTPUT

      - name: Post Summary to Workflow
        id: summary
        shell: bash
        env:
          MESSAGE: ${{ steps.create-message.outputs.message }}
        run: |
          echo "${MESSAGE}" >> $GITHUB_STEP_SUMMARY

      - name: Post Summary to Slack
        if: ${{ inputs.slack-channel != '' }}
        uses: SonarSource/release-github-actions/slack-message@v1
        with:
          channel: ${{ inputs.slack-channel }}
          message-markdown: ${{ steps.create-message.outputs.message }}
