name: Test Update Analysis as a Service Action

on:
  workflow_call:
  pull_request:
    paths:
      - 'update-analysis-as-a-service/**'
      - '.github/workflows/automated-release.yml'
      - '.github/workflows/test-update-analysis-as-a-service.yml'
  push:
    branches:
      - master
      - v*
    paths:
      - 'update-analysis-as-a-service/**'
      - '.github/workflows/automated-release.yml'
      - '.github/workflows/test-update-analysis-as-a-service.yml'
  workflow_dispatch:

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: github-ubuntu-latest-s

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          cd update-analysis-as-a-service
          pip install -r requirements.txt
          pip install pytest

      - name: Run unit tests
        run: |
          cd update-analysis-as-a-service
          python -m pytest test_update_sonar_plugins_versions_toml.py -v


