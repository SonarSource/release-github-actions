name: Test resolve-ktlo-epic

on:
  workflow_call:
  pull_request:
    paths:
      - 'resolve-ktlo-epic/**'
      - 'test-fixtures/jira/setup_ktlo.py'
      - 'test-fixtures/jira/cleanup_ktlo.py'
      - '.github/workflows/test-resolve-ktlo-epic.yml'
  push:
    branches:
      - master
      - v*
    paths:
      - 'resolve-ktlo-epic/**'
      - 'test-fixtures/jira/setup_ktlo.py'
      - 'test-fixtures/jira/cleanup_ktlo.py'
      - '.github/workflows/test-resolve-ktlo-epic.yml'
  workflow_dispatch:

jobs:
  unit-tests:
    name: Run Unit Tests
    runs-on: github-ubuntu-latest-s

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          cd resolve-ktlo-epic
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run unit tests
        run: |
          cd resolve-ktlo-epic
          python -m pytest test_resolve_ktlo_epic.py -v \
            --cov=resolve_ktlo_epic \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml

      - name: Upload coverage report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage-report-resolve-ktlo-epic
          path: resolve-ktlo-epic/coverage.xml

  integration-test:
    name: Integration Test (Jira Sandbox)
    runs-on: github-ubuntu-latest-s
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Get Jira Credentials from Vault
        id: secrets
        uses: SonarSource/vault-action-wrapper@c154b4a417b51cb98dd71137f49bf20e77c56820 # v3.4.0
        with:
          secrets: |
            development/kv/data/jira user | JIRA_USER;
            development/kv/data/jira token | JIRA_TOKEN;

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r test-fixtures/jira/requirements.txt

      - name: Create KTLO epic test fixtures
        id: setup
        env:
          JIRA_USER: ${{ fromJSON(steps.secrets.outputs.vault).JIRA_USER }}
          JIRA_TOKEN: ${{ fromJSON(steps.secrets.outputs.vault).JIRA_TOKEN }}
        run: |
          set -euo pipefail
          python test-fixtures/jira/setup_ktlo.py \
            --project-key GHA \
            --run-id "${{ github.run_id }}" \
            --jira-url "https://sonarsource-sandbox-608.atlassian.net/"
          STATE=$(cat /tmp/jira-ktlo-fixtures.json)
          echo "one_match_key=$(echo "$STATE" | jq -r .one_match_key)" >> "$GITHUB_OUTPUT"
          echo "multi_a_key=$(echo "$STATE"   | jq -r .multi_a_key)"   >> "$GITHUB_OUTPUT"
          echo "multi_b_key=$(echo "$STATE"   | jq -r .multi_b_key)"   >> "$GITHUB_OUTPUT"
          echo "no_match_key=$(echo "$STATE"  | jq -r .no_match_key)"  >> "$GITHUB_OUTPUT"

      # Case 1: One matching epic — action should output its key
      - name: Test one-match case
        id: one-match
        uses: ./resolve-ktlo-epic
        with:
          jira-project: GHA
          # pattern matches only the one_match epic summary (not multi_* or no_match)
          epic-name-pattern: 'KTLO test fixture ${{ github.run_id }} — one match'
          use-jira-sandbox: 'true'

      - name: Verify one-match result
        env:
          EPIC_KEY: ${{ steps.one-match.outputs.epic-key }}
          EXPECTED: ${{ steps.setup.outputs.one_match_key }}
        run: |
          if [[ "$EPIC_KEY" != "$EXPECTED" ]]; then
            echo "❌ Expected epic key '$EXPECTED', got '$EPIC_KEY'"
            exit 1
          fi
          echo "✅ one-match: got $EPIC_KEY"

      # Case 2: Multiple matching epics — action should output the first, warn
      - name: Test multi-match case
        id: multi-match
        uses: ./resolve-ktlo-epic
        with:
          jira-project: GHA
          # pattern matches both multi_a and multi_b
          epic-name-pattern: 'KTLO test fixture ${{ github.run_id }} — multi'
          use-jira-sandbox: 'true'

      - name: Verify multi-match result
        env:
          EPIC_KEY: ${{ steps.multi-match.outputs.epic-key }}
        run: |
          if [[ -z "$EPIC_KEY" ]]; then
            echo "❌ Expected a non-empty epic key for multi-match case, got empty"
            exit 1
          fi
          echo "✅ multi-match: got $EPIC_KEY (first of multiple matches)"

      # Case 3: Zero matching epics — action should output empty, warn but not fail
      - name: Test no-match case
        id: no-match
        uses: ./resolve-ktlo-epic
        with:
          jira-project: GHA
          epic-name-pattern: 'THIS_PATTERN_WILL_NOT_MATCH_ANY_EPIC_XYZZY'
          use-jira-sandbox: 'true'

      - name: Verify no-match result
        env:
          EPIC_KEY: ${{ steps.no-match.outputs.epic-key }}
        run: |
          if [[ -n "$EPIC_KEY" ]]; then
            echo "❌ Expected empty epic key for no-match case, got '$EPIC_KEY'"
            exit 1
          fi
          echo "✅ no-match: got empty string as expected"

      - name: Clean up KTLO test fixtures
        if: always() && steps.secrets.conclusion == 'success'
        env:
          JIRA_USER: ${{ fromJSON(steps.secrets.outputs.vault).JIRA_USER }}
          JIRA_TOKEN: ${{ fromJSON(steps.secrets.outputs.vault).JIRA_TOKEN }}
        run: |
          if [ -f /tmp/jira-ktlo-fixtures.json ]; then
            python test-fixtures/jira/cleanup_ktlo.py \
              --jira-url "https://sonarsource-sandbox-608.atlassian.net/" \
              --state-file /tmp/jira-ktlo-fixtures.json
          else
            echo "State file not found — setup failed before writing fixtures, nothing to clean up."
          fi
