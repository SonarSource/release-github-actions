name: Test Notify Failure Action

on:
  workflow_call:
  pull_request:
    paths:
      - 'notify-failure/**'
      - '.github/workflows/test-notify-failure.yml'
  push:
    branches:
      - branch-*
    paths:
      - 'notify-failure/**'
      - '.github/workflows/test-notify-failure.yml'
  workflow_dispatch:

jobs:
  integration-test:
    name: Send Test Failure Notification
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      id-token: write
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Send test failure notification
        uses: ./notify-failure
        with:
          project-name: release-github-actions
          slack-channel: alerts-release-github-actions
          needs: '{"qa_plugin":{"result":"failure"},"build":{"result":"success"}}'

  unit-tests:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: notify-failure/requirements.txt

      - name: Install dependencies
        run: |
          cd notify-failure
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run unit tests
        run: |
          cd notify-failure
          python -m pytest test_notify_failure.py -v --cov=notify_failure --cov-report=term-missing
