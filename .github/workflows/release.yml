name: Release

on:
  release:
    types: [published]

jobs:
  update-version-branch:
    name: Update version branch
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # Pass token so that git push is authenticated without needing to rewrite the remote URL manually
          token: ${{ github.token }}

      - name: Update version branch
        shell: bash
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          MAJOR=$(echo "$RELEASE_TAG" | cut -d. -f1)
          VERSION_BRANCH="v${MAJOR}"

          git fetch --all --tags
          git checkout "$VERSION_BRANCH"
          git reset --hard "$RELEASE_TAG"

          # Pin every internal @master ref to the exact release commit SHA so
          # the version branch is a frozen snapshot, not a floating reference.
          RELEASE_SHA=$(git rev-parse "${RELEASE_TAG}^{commit}")
          find . -type f \( -name "action.yml" -o -name "automated-release.yml" \) \
            -not -path "./.git/*" \
            -exec grep -l "SonarSource/release-github-actions/" {} \; \
            | while read -r f; do
                sed -i -E "s|(SonarSource/release-github-actions/[^@]+)@master|\1@${RELEASE_SHA}|g" "$f"
              done

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          # ponytail: || true guards the no-op when nothing changed (e.g. re-release of same SHA)
          git commit -m "Pin internal action refs to ${RELEASE_SHA} for ${VERSION_BRANCH} snapshot" || true
          git push origin "$VERSION_BRANCH" --force-with-lease
